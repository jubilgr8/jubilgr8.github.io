<div class="o-bottom-navigation" data-v-1c5cdfb2="">
  <div class="sf-bottom-navigation" data-v-1c5cdfb2="">
    <div class="sf-bottom-navigation-item" data-v-1c5cdfb2="">
      <button 
        class="sf-button sf-button--pure sf-bottom-navigation-item__icon" 
        style="outline: none;"
        [routerLink]="['/home']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >
        <i _ngcontent-xfp-c55="" class="ti-home"></i>
      </button>
      <!-- <div class="sf-bottom-navigation-item__label sf-bottom-navigation-item--has-margin">
        Home
      </div> -->
    </div>
    <div class="sf-bottom-navigation-item" data-v-1c5cdfb2="">
      <button

      style="outline: none;"
      [routerLink]="['/menu']" 
      routerLinkActive="active" 
      [routerLinkActiveOptions]="{ exact: true }">
        <i _ngcontent-xfp-c55="" class="ti-list"></i>
      </button>
      <!-- <div class="sf-bottom-navigation-item__label sf-bottom-navigation-item--has-margin">
        Menu
      </div> -->
    </div>
    <div class="sf-bottom-navigation-item" data-v-1c5cdfb2="">
      <button 
        class="sf-button sf-button--pure sf-bottom-navigation-item__icon" 
        style="outline: none;"
        [routerLink]="['/search']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >

      </button>
      <!-- <div class="sf-bottom-navigation-item__label sf-bottom-navigation-item--has-margin">
        Search
      </div> -->

    <div class="sf-bottom-navigation-item" data-v-1c5cdfb2="">

        >

      <!-- <div class="sf-bottom-navigation-item__label sf-bottom-navigation-item--has-margin">

    <div class="sf-bottom-navigation-item sf-bottom-navigation-item--floating" data-v-1c5cdfb2="">
