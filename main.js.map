<div class="sf-modal__content mobile-only">
<form data-v-04d1c100="" class="form">
  <div data-v-04d1c100="" class="sf-input form__element">
    <div class="sf-input__wrapper"><input id="email" required="required" name="email" type="text" class=""
        style="outline: none;"> <span class="sf-input__bar"></span> <label for="email" class="sf-input__label">Your
        email</label>
      <!---->
    </div>
    <div class="sf-input__error-message">
      <!---->
    </div>
  </div>
  <div data-v-04d1c100="" class="sf-input form__element">
    <div class="sf-input__wrapper"><input id="password" required="required" name="password" type="password" class=""
        style="outline: none;"> <span class="sf-input__bar"></span> <label for="password"
        class="sf-input__label">Password</label>
      <!---->
    </div>
    <div class="sf-input__error-message">
      <!---->
    </div>
  </div>
  <div data-v-04d1c100="" class="sf-checkbox form__element form__checkbox"><label class="sf-checkbox__container"><input
        type="checkbox" name="remember-me" class="sf-checkbox__input" value="" style="outline: none;">
      <div class="sf-checkbox__checkmark">
        <!---->
      </div>
      <div class="sf-checkbox__label">Remember me</div>
    </label></div> <button data-v-04d1c100="" class="sf-button sf-button--full-width form__submit"
    style="outline: none;">
    Login
  </button>
</form>
<button data-v-04d1c100="" class="sf-button sf-button--text action-button" style="outline: none;">
  Forgotten password?
</button>
<div data-v-04d1c100="" class="aside">
  <header data-v-04d1c100="" class="sf-heading aside__heading">
    <h3 class="sf-heading__title sf-heading__title--h3">
      Don't have an account yet?
    </h3>
    <!---->
  </header> <button data-v-04d1c100="" class="sf-button sf-button--text" style="outline: none;">
    Register now
  </button>
</div>
</div>

<div class="app  login2-bg header-fixed desktop-only" style="margin-top: 100px;">
  <div class="app-body flex-row align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6" style="text-align: center;">
          <div class="card-group mb-0">
            <div class="card pl-5 p-4">
              <div class="card-body"> 
                <img src="assets/img/logo.png" class="login-icon" style="max-width: 10%;">
                <h2>Admin Login</h2>
                <p class="text-muted">Welcome to Admin Portal</p>
                <app-list-errors></app-list-errors>

                <app-dynamic-form (updateForm)="updateForm($event)" [data$]="data$" [structure$]="structure$">
                </app-dynamic-form>
                <div class="row">
                  <div class="col-8">
                    <!-- <button type="button" class="btn btn-link px-0 text-danger">Register </button> | <button
                      type="button" class="btn btn-link px-0 text-dark ">Forgot password?</button> -->
                  </div>
                  <div class="col-4 text-right"><button type="button" class="btn btn-danger px-4"
                      (click)="submit()">Login</button>

                  </div>
                </div>
              </div>
            </div>
            <!--<div class="card text-white bg-dark py-5 d-md-down-none" style="width:44%">
            <div class="card-body text-center">
              <div>
                <h2>VMS</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                <button type="button" class="btn btn-dark active mt-3">Register Now!</button>
              </div>
            </div>
          </div>-->
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
